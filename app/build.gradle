plugins {
    id 'com.android.application'
}

android {
    namespace 'com.mhfzati.expense_tracker'
    compileSdk 34

    defaultConfig {
        applicationId "com.mhfzati.expense_tracker"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // Allow UTF-8 app name
    defaultConfig {
        resValue "string", "app_name", "محفظتي"
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
